name: Deploy Full MERN Stack to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy-all-to-ec2:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to your root application directory
            # UPDATE THIS to your actual project folder path on the EC2 instance
            cd /var/www/my-mern-app
            
            # 2. Pull the latest code
            git pull origin main

            # ---------------------------------------------------
            # TIER 3: DATABASE (MongoDB)
            # ---------------------------------------------------
            if ! command -v mongod &> /dev/null; then
                echo "MongoDB not found. Installing..."
                sudo apt-get update
                sudo apt-get install -y mongodb
            fi
            sudo systemctl start mongodb
            sudo systemctl enable mongodb

            # ---------------------------------------------------
            # TIER 2: BACKEND (Node.js)
            # ---------------------------------------------------
            # UPDATE THIS if your backend folder is named differently
            cd backend 
            
            echo "Creating .env file..."
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "PORT=${{ secrets.PORT || 5000 }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

            npm install
            
            # Restart or start the backend process
            pm2 restart backend-api || pm2 start index.js --name "backend-api"
            
            cd .. # Go back to root project folder

            # ---------------------------------------------------
            # TIER 1: FRONTEND (React/Vite/etc.)
            # ---------------------------------------------------
            # UPDATE THIS if your frontend folder is named differently
            cd frontend
            
            npm install
            npm run build
            
            # NOTE: To serve the frontend from EC2, you typically use Nginx.
            # If Nginx is configured to serve from /var/www/html, uncomment the lines below:
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/   # Use build/* if using Create React App instead of Vite
            sudo systemctl restart nginx

            echo "Deployment to EC2 completed successfully!"
            echo "Backend API running on port ${PORT:-5000}"
            echo "Frontend served via Nginx at your IP. Open in this format: http://your-ec2-ip-or-domain"