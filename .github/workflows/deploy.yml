name: Deploy 3-Tier Web App

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------
  # TIER 1: FRONTEND DEPLOYMENT (S3)
  # ---------------------------------------------------
  deploy-frontend-to-s3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync frontend to S3 bucket
        run: |
          # Assuming your frontend is in the root. If it's in a subfolder, navigate there first (e.g., cd frontend)
          aws s3 sync . s3://${{ secrets.AWS_S3_BUCKET }} --delete --exclude ".git/*" --exclude ".github/*"

  # ---------------------------------------------------
  # TIER 2 & 3: BACKEND & DATABASE DEPLOYMENT (EC2)
  # ---------------------------------------------------
  deploy-backend-to-ec2:
    runs-on: ubuntu-latest
    needs: deploy-frontend-to-s3 # Ensures frontend deploys successfully before backend starts
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to your application directory
            # UPDATE THIS to your actual backend folder path on the EC2 instance
            cd /var/www/my-mern-app/backend 
            
            # 2. Pull the latest code
            git pull origin main

            # 3. Dynamically generate the .env file
            echo "Creating .env file..."
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            echo "PORT=${{ secrets.PORT || 5000 }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

            # 4. Ensure MongoDB is installed and running
            # Note: For a true production 3-tier setup, consider moving MongoDB to a separate EC2 or Atlas eventually.
            if ! command -v mongod &> /dev/null; then
                echo "MongoDB not found. Installing..."
                sudo apt-get update
                sudo apt-get install -y mongodb
            fi
            sudo systemctl start mongodb
            sudo systemctl enable mongodb

            # 5. Install Node dependencies and restart the backend
            npm install
            
            # Using PM2 to keep the Node app alive. 
            # If PM2 isn't installed globally on your EC2, run: sudo npm install -g pm2
            pm2 restart backend-api || pm2 start index.js --name "backend-api"